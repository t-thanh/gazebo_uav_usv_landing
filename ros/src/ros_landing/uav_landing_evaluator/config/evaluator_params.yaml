# ─────────────────────────────────────────────────────────────────────────────
# uav_landing_evaluator — drop test parameters
# ─────────────────────────────────────────────────────────────────────────────

# ── Scenario control ──────────────────────────────────────────────────────────
n_scenarios:    5          # number of drop tests to run
drop_height:   15.0        # m above the landing pad center for each drop
xy_range:       2.0        # m — max horizontal offset from pad center (uniform disc)

# Random initial tilt range [degrees] added to simulate a non-level drop
tilt_range_deg: 15.0

# ── Landing pad (landing_pad_sensor model pose in world frame) ────────────────
# pad_center is the center of the sensor pad:
#   x, y = horizontal center  |  z = deck top face (pad CENTER = top + 0.005 m)
# With usv_deck spawned at (0,0,0): deck top at z=0.35, pad center at z=0.355
pad_center: [0.0, 0.0, 0.355]

# ── Drone physical parameters (must match drop_uav model.sdf) ─────────────────
drone_mass: 2.0            # kg — used for kinetic energy computation

# ── Timing ────────────────────────────────────────────────────────────────────
contact_timeout:  12.0     # s — abort scenario if no contact within this time
settle_time:       2.0     # s — wait after landing before resetting for next drop
park_altitude:   100.0     # m — altitude used to park drop_uav between scenarios

# ── State buffer for pre-contact velocity lookup ──────────────────────────────
state_buffer_size:  1000   # number of /gazebo/model_states samples to buffer
pre_contact_window:  0.08  # s — look this far back in the buffer to get
                           #     the velocity JUST BEFORE contact

# ── Landing quality score weights ─────────────────────────────────────────────
# score = 100 × exp(-α·KE) × exp(-β·tilt) × exp(-γ·miss)
#
#   α: penalty per Joule of kinetic energy
#   β: penalty per degree of tilt at touchdown
#   γ: penalty per meter of horizontal miss distance
#
# Calibration guide:
#   Free-fall from 15 m → KE ≈ 294 J.
#     α = 0.002 → KE factor ≈ 0.55  (max score ≈ 55/100 for zero tilt, on-centre)
#   Controlled landing at 0.5 m/s → KE ≈ 0.25 J.
#     α = 0.002 → KE factor ≈ 0.9995  (score limited only by tilt and miss)
#   Set α = 0.0 to make the score purely geometric (miss + tilt only).
score_alpha: 0.002         # /J   — calibrated for 0–300 J range
score_beta:  0.04          # /deg — 10° tilt → factor 0.67
score_gamma: 0.40          # /m   — 1 m miss → factor 0.67

# ── Output ────────────────────────────────────────────────────────────────────
csv_output: /tmp/landing_eval_results.csv
